<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEENAI B-01 Allocation v1.8</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--sf3:#2a2f46;--bd:#2e3350;--ac:#4f8ef7;--ok:#22c55e;--wn:#f59e0b;--dg:#ef4444;--tx:#e2e8f0;--tx2:#8892a4;--tx3:#4a5568;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;height:46px;}
.logo{font-size:17px;font-weight:800;letter-spacing:1px;}.logo span{color:var(--ac);}
.hd-ver{font-size:11px;color:var(--ac);font-weight:600;}
.hd-user{margin-left:auto;font-size:12px;background:rgba(79,142,247,.15);color:var(--ac);padding:3px 10px;border-radius:12px;display:none;font-family:'Segoe UI',sans-serif;}
.main{max-width:1500px;margin:0 auto;padding:14px 16px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.btn-ac{background:var(--ac);color:#fff;}
.login-card{text-align:center;padding:40px;}
.login-card h2{margin-bottom:8px;font-size:16px;}
.login-card p{color:var(--tx2);margin-bottom:16px;font-size:12px;}
#log{font-size:11px;color:var(--tx2);max-height:150px;overflow-y:auto;padding:8px;background:var(--sf2);border-radius:6px;margin-top:8px;display:none;}
.log-ok{color:var(--ok);}.log-err{color:var(--dg);}.log-info{color:var(--ac);}
.sum-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.sc{background:var(--sf2);border-radius:8px;padding:8px 12px;min-width:90px;text-align:center;}
.sc .lb{font-size:10px;color:var(--tx2);}.sc .vl{font-size:18px;font-weight:700;}
.sc .vl.plus{color:var(--ok);}.sc .vl.minus{color:var(--dg);}
.itabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px;}
.itab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx2);}
.itab:hover{border-color:var(--ac);color:var(--tx);}.itab.on{background:var(--ac);color:#fff;border-color:var(--ac);}
table.dt{width:100%;border-collapse:collapse;font-size:11px;}
table.dt th{background:var(--sf2);color:var(--tx2);font-weight:600;font-size:10px;padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);}
table.dt td{padding:3px 6px;border-bottom:1px solid var(--bd);}
table.dt tr:hover{background:var(--sf2);}
.r{text-align:right;}
.gh{background:var(--sf3);font-weight:700;color:var(--ac);}
.gh2{background:rgba(79,142,247,.08);font-weight:600;color:var(--tx);font-size:11px;}
.pol-row{background:linear-gradient(90deg,var(--ac) 3px,var(--sf3) 3px);font-weight:700;font-size:12px;}
.pol-row td{padding:6px 8px!important;color:var(--tx);}
.pol-row .pol-name{color:var(--ac);font-size:13px;}
.pol-row .pol-num{font-size:13px;}
.neg{color:var(--dg);}.pos{color:var(--ok);}
.sp{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:900px){.sp{grid-template-columns:1fr;}}
.al{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:8px;background:rgba(79,142,247,.1);color:var(--ac);border:1px solid rgba(79,142,247,.3);}
.hid{display:none!important;}
.ld::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spn .6s linear infinite;margin-left:6px;}
@keyframes spn{to{transform:rotate(360deg)}}
.ct{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.btn-ref{background:var(--sf2);color:var(--ac);border:1px solid var(--ac);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-ref:hover{background:var(--ac);color:#fff;}
.btn-ref:disabled{opacity:.4;cursor:not-allowed;}
.ts{font-size:10px;color:var(--tx3);margin-left:6px;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.btn-file{background:var(--sf2);color:var(--wn);border:1px solid var(--wn);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;}
.btn-file:hover{background:var(--wn);color:#000;}
.freight-badge{font-size:10px;background:rgba(245,158,11,.15);color:var(--wn);padding:2px 8px;border-radius:10px;}
table.mx{width:100%;border-collapse:collapse;font-size:10px;table-layout:auto;}
table.mx th{background:var(--sf2);color:var(--tx2);font-size:9px;font-weight:600;padding:3px 4px;border:1px solid var(--bd);text-align:center;white-space:nowrap;}
table.mx td{padding:2px 3px;border:1px solid var(--bd);text-align:center;vertical-align:top;min-width:48px;}
table.mx th.pol-hd{text-align:left;min-width:70px;position:sticky;left:0;z-index:5;background:var(--sf2);}
table.mx td.pol-td{text-align:left;font-weight:600;font-size:11px;position:sticky;left:0;z-index:4;background:var(--sf);}
.mx-cell{border-radius:3px;padding:2px 3px;font-size:10px;}
.mx-plus{background:rgba(34,197,94,.15);color:var(--ok);}
.mx-mid{background:rgba(245,158,11,.12);color:var(--wn);}
.mx-neg{background:rgba(239,68,68,.12);color:var(--dg);}
.mx-na{color:var(--tx3);font-size:9px;}
.mx-carrier{font-size:8px;color:rgba(255,255,255,.6);}
.mx-bkg{font-size:8px;color:var(--ac);font-weight:600;}
.mx-rank{font-size:9px;line-height:1.4;white-space:nowrap;}
.mx-rank .rk1{color:var(--ok);font-weight:700;}
.mx-rank .rk2{color:var(--tx2);}
.mx-rank .rk3{color:var(--tx3);}
.ai-panel{background:var(--sf);border:1px solid var(--ac);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;}
.ai-title{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ai-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bd);font-size:11px;}
.ai-row:last-child{border-bottom:none;}
.ai-route{color:var(--tx);}
.ai-route span{color:var(--ac);}
.ai-margin{font-weight:600;}
.ai-margin.p{color:var(--ok);}.ai-margin.n{color:var(--dg);}
.ai-total{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--ac);font-size:12px;font-weight:700;}
.ai-note{font-size:10px;color:var(--tx2);margin-top:6px;line-height:1.5;}
.mx-wrap{overflow-x:auto;max-width:100%;}
.footer{text-align:center;padding:20px 0;font-size:13px;color:var(--ac);border-top:1px solid var(--bd);margin-top:16px;font-weight:600;letter-spacing:1px;}
</style>
</head>
<body>
<div class="hd">
  <div class="logo"><span>LEENAI</span></div>
  <span style="font-size:13px;font-weight:600">B-01 Allocation</span>
  <div class="hd-ver">v1.8</div>
  <button class="btn-ref hid" id="refBtn" onclick="refresh()">Refresh</button>
  <span class="ts hid" id="tsSpan"></span>
  <div class="hd-user" id="hU"></div>
</div>
<div class="main">
<div class="card login-card" id="lC">
  <h2>COMPASS Dataverse Login</h2>
  <p>Azure AD Authentication - COMPASS Contract Data Direct Access</p>
  <button class="btn btn-ac" onclick="startLogin()">Login</button>
  <div id="log"></div>
</div>
<div id="dA" class="hid">
  <div id="aA"></div>
  <div class="toolbar">
    <button class="btn-file" onclick="loadFreight()">Load Freight Rate (xlsx)</button>
    <span id="frLabel" style="font-size:11px;color:var(--tx2)">Not loaded</span>
  </div>
  <div class="sum-row" id="sR"></div>
  <div class="itabs" id="iT"></div>
  <div class="sp">
    <div>
      <div class="card">
        <div class="ct">Sales (Sell Balance)</div>
        <div id="sT"></div>
      </div>
      <div class="card" style="margin-top:10px" id="mxCard">
        <div class="ct">Margin Matrix (POL × POD) <span id="mxStatus" style="font-size:10px;color:var(--tx3);font-weight:400"></span></div>
        <div class="mx-wrap" id="mxArea"></div>
      </div>
      <div class="ai-panel" id="aiPanel" style="display:none;margin-top:10px">
        <div class="ai-title">LEENAI 推奨配分</div>
        <div id="aiContent"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="ct">Buy (Purchase Balance)</div>
        <div id="bT"></div>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="ct">Data Check</div>
    <div id="dB" style="font-size:11px;color:var(--tx2);max-height:200px;overflow:auto"></div>
  </div>
</div>
<div class="footer">✦ Powered by LEENAI Automation System</div>
</div>
<script>
const CID='f071a165-5e9b-44bf-b6a1-baba654524db',TID='a56988ff-c2b8-4df8-9727-889ad4205198';
const RU='https://mhlee205.github.io/ALLOCATION_LENAI/';
const DV='https://orgde512c6f.crm7.dynamics.com',DA=DV+'/api/data/v9.2';
const SC=DV+'/user_impersonation openid profile';
let AT=null;

function b6(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function sh(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));}
function rn(n=64){const a=new Uint8Array(n);crypto.getRandomValues(a);return b6(a).slice(0,n);}

async function startLogin(){
  lg('Login...','info');
  const v=rn(64),ch=b6(await sh(v)),st=rn(16);
  sessionStorage.setItem('pkce_v',v);sessionStorage.setItem('pkce_s',st);
  location.href=`https://login.microsoftonline.com/${TID}/oauth2/v2.0/authorize?`+new URLSearchParams({client_id:CID,response_type:'code',redirect_uri:RU,scope:SC,state:st,code_challenge:ch,code_challenge_method:'S256',prompt:'select_account'});
}

async function hCb(){
  const p=new URLSearchParams(location.search),code=p.get('code');
  if(!code)return false;
  if(p.get('state')!==sessionStorage.getItem('pkce_s')){alert('State mismatch');return false;}
  lg('Token...','info');
  try{
    const r=await fetch(`https://login.microsoftonline.com/${TID}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:CID,grant_type:'authorization_code',code,redirect_uri:RU,code_verifier:sessionStorage.getItem('pkce_v'),scope:SC})});
    const d=await r.json();if(!d.access_token)throw new Error(d.error_description||'fail');
    AT=d.access_token;history.replaceState({},'',RU);
    sessionStorage.removeItem('pkce_v');sessionStorage.removeItem('pkce_s');
    try{
      const b64=AT.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      const raw=atob(b64);const bytes=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
      const pl=JSON.parse(new TextDecoder().decode(bytes));
      const nm=pl.name||pl.preferred_username||'';
      $('hU').textContent=nm;$('hU').style.display='block';
    }catch(e){}
    lg('Login OK','ok');return true;
  }catch(e){lg(e.message,'err');return false;}
}

async function dg(p){
  const r=await fetch(`${DA}/${p}`,{headers:{'Authorization':'Bearer '+AT,'OData-MaxVersion':'4.0','OData-Version':'4.0','Accept':'application/json','Prefer':'odata.include-annotations="OData.Community.Display.V1.FormattedValue",odata.maxpagesize=5000'}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`${r.status}: ${e?.error?.message||r.statusText}`);}
  return r.json();
}
async function dgA(p){let a=[],u=p;while(u){const d=await dg(u);a=a.concat(d.value||[]);u=d['@odata.nextLink']?d['@odata.nextLink'].replace(DA+'/',''):null;}return a;}

let IT={},BD=[],SD=[],BK=[],PM={},SM={},PK={},BY={},PD={},DRAY_AVG={},BKG_RAW=[],CARRIERS={};

async function load(){
  sa('Data loading...',true);
  try{
    lg('Items...','info');
    (await dgA("cr49f_items?$select=cr49f_itemid,cr49f_item")).forEach(i=>IT[i.cr49f_itemid]=i.cr49f_item);
    lg('Items: '+Object.keys(IT).length,'ok');

    lg('Purchase details...','info');
    BD=await dgA("cr49f_purchase_details?$filter=cr49f_closing eq false&$select=cr49f_purchase_detailid,cr49f_quantity,cr49f_price,cr49f_loading_port,cr49f_incoterms,cr49f_count,_cr49f_item_id_value,_cr49f_purchase_contract_id_value");
    lg('Purchase: '+BD.length,'ok');

    lg('Sales details...','info');
    SD=await dgA("cr49f_sale_details?$filter=cr49f_closing eq false&$select=cr49f_sale_detailid,cr49f_quantity,cr49f_price,cr49f_price_yen,_cr49f_item_id_value,_cr49f_sale_contract_id_value");
    lg('Sales: '+SD.length,'ok');

    lg('Booking details...','info');
    BK=await dgA("cr49f_booking_details?$select=cr49f_net,cr49f_count,_cr49f_booking_id_value,_cr49f_purchase_contract_detail_id_value,_cr49f_sale_contract_detail_id_value,_cr49f_item_id_value");
    lg('BKG detail: '+BK.length,'ok');

    // 進行中ブッキング (ETD 2ヶ月前~3ヶ月先)
    lg('Active bookings...','info');
    const bkgFrom=new Date();bkgFrom.setMonth(bkgFrom.getMonth()-2);
    const bkgTo=new Date();bkgTo.setMonth(bkgTo.getMonth()+3);
    const bkgData=await dgA(
      "cr49f_bookings?$filter=cr49f_etd ge "+bkgFrom.toISOString().split('T')[0]+"T00:00:00Z"+
      " and cr49f_etd le "+bkgTo.toISOString().split('T')[0]+"T23:59:59Z"+
      "&$select=cr49f_bookingid,cr49f_booking_no,_cr49f_carrier_id_value,_cr49f_region_japan_id_value,_cr49f_region_id_value"
    );
    lg('Active BKG: '+bkgData.length,'ok');

    // Carrier名 解決
    const crGuids=[...new Set(bkgData.map(b=>b._cr49f_carrier_id_value).filter(Boolean))];
    (await Promise.all(crGuids.map(g=>dg(`crcf9_carriers(${g})?$select=crcf9_carrier`).catch(()=>null)))).forEach((r,i)=>{if(r)CARRIERS[crGuids[i]]=r.crcf9_carrier;});
    
    // POL/POD GUID→名前 (既存PDマスターに追加)
    const bkgPolGuids=[...new Set(bkgData.map(b=>b._cr49f_region_japan_id_value).filter(Boolean))];
    const POL_NAMES={};
    (await Promise.all(bkgPolGuids.map(g=>dg(`crcf9_region_japans(${g})?$select=crcf9_pol`).catch(()=>null)))).forEach((r,i)=>{if(r)POL_NAMES[bkgPolGuids[i]]=r.crcf9_pol;});
    const bkgPodGuids=[...new Set(bkgData.map(b=>b._cr49f_region_id_value).filter(Boolean))];
    const newPodGuids=bkgPodGuids.filter(g=>!PD[g]);
    (await Promise.all(newPodGuids.map(g=>dg(`cr49f_regions(${g})?$select=cr49f_pod,cr49f_region`).catch(()=>null)))).forEach((r,i)=>{if(r)PD[newPodGuids[i]]={p:r.cr49f_pod,r:r.cr49f_region};});

    // BKG→POL/POD/Carrier マッピング (POL は英語に変換)
    const bkgMap={};
    bkgData.forEach(b=>{
      const polJp=POL_NAMES[b._cr49f_region_japan_id_value]||'?';
      bkgMap[b.cr49f_bookingid]={
        pol:POL_MAP[polJp]||polJp,
        pod:(PD[b._cr49f_region_id_value]||{}).p||'?',
        carrier:CARRIERS[b._cr49f_carrier_id_value]||'?'
      };
    });

    // BKG_RAW: 개별 레코드 (Item별 필터 가능)
    BKG_RAW=[];
    let bkgMatchCount=0,bkgNoId=0,bkgNoMap=0;
    BK.forEach(bd=>{
      const bkgId=bd._cr49f_booking_id_value;
      if(!bkgId){bkgNoId++;return;}
      const info=bkgMap[bkgId];
      if(!info){bkgNoMap++;return;}
      bkgMatchCount++;
      const itemName=IT[bd._cr49f_item_id_value]||'?';
      BKG_RAW.push({pol:info.pol,pod:info.pod,carrier:info.carrier,item:itemName,mt:bd.cr49f_net||0});
    });
    lg(`BKG join: ${BK.length}件中 match=${bkgMatchCount}, no_bkg_id=${bkgNoId}, no_map=${bkgNoMap}`,bkgNoId>BK.length/2?'err':'ok');
    lg(`BKG raw: ${BKG_RAW.length} records (bkgMap: ${Object.keys(bkgMap).length} bookings)`,'ok');
    if(BK.length>0&&bkgNoId>BK.length/2){
      lg('⚠ _cr49f_booking_id_value が大半null → フィールド名要確認','err');
      const sample=BK[0];
      const fields=Object.keys(sample).filter(k=>k.includes('booking')||k.includes('Booking'));
      lg('BKG detail fields with "booking": '+fields.join(', '),'info');
    }

    lg('Packer...','info');
    const pcG=[...new Set(BD.map(b=>b._cr49f_purchase_contract_id_value).filter(Boolean))];
    (await Promise.all(pcG.map(g=>dg(`cr49f_purchase_contracts(${g})?$select=_cr49f_packer_id_value,cr49f_exchange_rate,cr49f_purchase_contract_no`).catch(()=>null)))).forEach((r,i)=>{if(r)PM[pcG[i]]={pk:r._cr49f_packer_id_value,rt:r.cr49f_exchange_rate,no:r.cr49f_purchase_contract_no};});
    const pkG=[...new Set(Object.values(PM).map(p=>p.pk).filter(Boolean))];
    (await Promise.all(pkG.map(g=>dg(`cr49f_packers(${g})?$select=cr49f_packer`).catch(()=>null)))).forEach((r,i)=>{if(r)PK[pkG[i]]=r.cr49f_packer;});
    lg('Packer: '+Object.keys(PK).length,'ok');

    lg('Buyer/POD...','info');
    const scG=[...new Set(SD.map(s=>s._cr49f_sale_contract_id_value).filter(Boolean))];
    (await Promise.all(scG.map(g=>dg(`cr49f_sale_contracts(${g})?$select=cr49f_sale_contract_no,cr49f_latest_shipment,_cr49f_buyer_id_value,_cr49f_pod1_value`).catch(()=>null)))).forEach((r,i)=>{if(r)SM[scG[i]]={by:r._cr49f_buyer_id_value,pod:r._cr49f_pod1_value,ls:r.cr49f_latest_shipment,no:r.cr49f_sale_contract_no};});
    const byG=[...new Set(Object.values(SM).map(s=>s.by).filter(Boolean))];
    (await Promise.all(byG.map(g=>dg(`cr49f_buyers(${g})?$select=cr49f_buyer,crcf9_country`).catch(()=>null)))).forEach((r,i)=>{if(r)BY[byG[i]]={n:r.cr49f_buyer,c:r.crcf9_country};});
    const pdG=[...new Set(Object.values(SM).map(s=>s.pod).filter(Boolean))];
    (await Promise.all(pdG.map(g=>dg(`cr49f_regions(${g})?$select=cr49f_pod,cr49f_region`).catch(()=>null)))).forEach((r,i)=>{if(r)PD[pdG[i]]={p:r.cr49f_pod,r:r.cr49f_region};});
    lg('Buyer: '+Object.keys(BY).length+', POD: '+Object.keys(PD).length,'ok');

    // ドレー費 (最近2ヶ月 Plant別平均)
    lg('Dray cost (2months avg)...','info');
    const twoMonthsAgo=new Date();twoMonthsAgo.setMonth(twoMonthsAgo.getMonth()-2);
    const dtStr=twoMonthsAgo.toISOString().split('T')[0]+'T00:00:00Z';
    const drayData=await dgA(
      "crcf9_container_informations?$filter=crcf9_work_date ge "+dtStr+
      " and crcf9_dray_cost gt 0"+
      "&$select=crcf9_dray_cost,crcf9_incoterms,_crcf9_parker_plant_id_value"
    );
    const draySum={};
    drayData.forEach(d=>{
      if(d.crcf9_incoterms!=='店頭')return;
      const pl=d._crcf9_parker_plant_id_value;if(!pl)return;
      if(!draySum[pl])draySum[pl]={total:0,cnt:0};
      draySum[pl].total+=d.crcf9_dray_cost;draySum[pl].cnt++;
    });
    Object.entries(draySum).forEach(([k,v])=>{DRAY_AVG[k]=Math.round(v.total/v.cnt);});
    lg('Dray: '+Object.keys(DRAY_AVG).length+' plants, data: '+drayData.length+' records','ok');

    // 割当済 집계
    const aP={},aS={};
    BK.forEach(b=>{const p=b._cr49f_purchase_contract_detail_id_value,s=b._cr49f_sale_contract_detail_id_value,n=b.cr49f_net||0;if(p)aP[p]=(aP[p]||0)+n;if(s)aS[s]=(aS[s]||0)+n;});

    BD.forEach(b=>{
      b._it=IT[b._cr49f_item_id_value]||'?';
      const pc=PM[b._cr49f_purchase_contract_id_value]||{};
      b._pk=PK[pc.pk]||'?';b._rt=pc.rt||155;b._co=pc.no||'';
      b._al=aP[b.cr49f_purchase_detailid]||0;
      b._rm=Math.round(((b.cr49f_quantity||0)-b._al)*100)/100;
      b._pol=b.cr49f_loading_port||'-';
    });
    SD.forEach(s=>{
      s._it=IT[s._cr49f_item_id_value]||'?';
      const sc=SM[s._cr49f_sale_contract_id_value]||{};
      const by=BY[sc.by]||{},pd=PD[sc.pod]||{};

      s._rm=Math.round(((s.cr49f_quantity||0)-s._al)*100)/100;
    });

    sa('',false);lg('All data loaded','ok');render();
  }catch(e){sa('Error: '+e.message,false);lg('ERROR: '+e.message,'err');}
}

/* ═══════════════════════════════════════════
   マージン計算エンジン
   ═══════════════════════════════════════════ */
const JP2EN={'東京':'TOKYO','横浜':'YOKOHAMA','大阪':'OSAKA','神戸':'KOBE','那覇':'NAHA','名古屋':'NAGOYA','博多':'HAKATA','仙台':'SENDAI','新潟':'NIIGATA','金沢':'KANAZAWA'};
const POD_ABBR={JAKARTA:'JKT',SURABAYA:'SBY',LAEMCHABANG:'LCB','LAT KRABANG':'LKB',BANGKOK:'BKK',KWANGYANG:'KWA',PUSAN:'PUS',INCHEON:'ICN',HOCHIMINH:'SGN',HAIPHONG:'HPH','CAI MEP':'CMT','BINH DUONG':'BDG',DANANG:'DNG','LEE & MAN':'L&M',TAIPEI:'TPE',TAICHUNG:'TXG',KAOHSIUNG:'KHH',TAOYUAN:'TYN',KEELUNG:'KEL',PENANG:'PEN','(古着)PORT KLANG':'PKL',CHITTAGONG:'CTG','NHAVA SHEVA':'NHV'};
const POD_COUNTRY={JKT:'ID',SBY:'ID',LCB:'TH',LKB:'TH',BKK:'TH',KWA:'KR',PUS:'KR',ICN:'KR',SGN:'VN',HPH:'VN',CMT:'VN',BDG:'VN',DNG:'VN','L&M':'VN',TPE:'TW',TXG:'TW',KHH:'TW',TYN:'TW',KEL:'TW',PEN:'MY',PKL:'MY',CTG:'BD',NHV:'IN'};

const CARRIER_SHORT={'ONE(DRY)':'ONE','ONE(RAD)':'ONE-R','ONE':'ONE','OOCL(紙運輸)':'OOCL','EVER(紙運輸)':'EVER',
  'INTERASIA':'IA','NAMSUNG':'NAM','DONGYOUNG':'DYL','WAN HAI':'WH','YANGMING':'YM','PAN OCEAN':'PAN',
  'MAERSK':'MSK','JINJIANG':'JJ','SINOKOR':'SKR','HEUNG-A':'HA','DONGJIN':'DJ','TS LINE':'TSL','TS LINES':'TSL',
  'CNC':'CNC','KMTC':'KMTC','ASL':'ASL','ZIM':'ZIM','HMM':'HMM','COSCO':'COSCO','HAPAG':'HPG',
  'SKR/HAL':'SKR',' KMTC':'KMTC','EHIME':'EHM','SITC':'SITC','OOCL':'OOCL'};
function cShort(c){return CARRIER_SHORT[c]||CARRIER_SHORT[c.trim()]||c.substring(0,4);}

// COMPASS POD → 運賃表POD 変換 (同一運賃で管理するもの)
const POD_ALIAS={'CAT LAI':'HOCHIMINH','SP-ITC':'HOCHIMINH'};

function calcAvgDray(){
  const vals=Object.values(DRAY_AVG);
  if(!vals.length)return 50000;
  return Math.round(vals.reduce((a,v)=>a+v,0)/vals.length);
}

function buildMarginData(){
  if(!Object.keys(FREIGHT).length)return null;
  const bf=SI==='ALL'?BD:BD.filter(b=>b._it===SI);
  const sf=SI==='ALL'?SD:SD.filter(s=>s._it===SI);
  if(!bf.length||!sf.length)return null;

  const avgDray=calcAvgDray();

  // POL별 가중평균 매입가 + 평균 환율 + 渡し条件 비율
  const polAgg={};
  bf.forEach(b=>{
    const pol=JP2EN[b._pol]||b._pol;
    if(!polAgg[pol])polAgg[pol]={totalCost:0,totalQty:0,tentoRatio:0,tentoCount:0,totalCount:0,rates:[],remain:0};
    const q=Math.max(b._rm,0);
    polAgg[pol].totalCost+=(b.cr49f_price||0)*q;
    polAgg[pol].totalQty+=q;
    polAgg[pol].remain+=b._rm;
    if(b.cr49f_incoterms==='店頭'){polAgg[pol].tentoCount++;} 
    polAgg[pol].totalCount++;
    polAgg[pol].rates.push(b._rt);
  });
  Object.values(polAgg).forEach(p=>{
    p.avgPrice=p.totalQty>0?p.totalCost/p.totalQty:0;
    p.avgRate=p.rates.length?p.rates.reduce((a,v)=>a+v,0)/p.rates.length:155;
    p.tentoRatio=p.totalCount>0?p.tentoCount/p.totalCount:0;
  });

  // POD별 가중평균 판매가
  const podAgg={};
  sf.forEach(s=>{
    const pod=s._pd;if(!pod||pod==='?')return;
    if(!podAgg[pod])podAgg[pod]={totalRev:0,totalQty:0,remain:0};
    const q=Math.max(s._rm,0);
    podAgg[pod].totalRev+=(s.cr49f_price||0)*q;
    podAgg[pod].totalQty+=q;
    podAgg[pod].remain+=s._rm;
  });
  Object.values(podAgg).forEach(p=>{
    p.avgPrice=p.totalQty>0?p.totalRev/p.totalQty:0;
  });

  // 활성 POD만 (잔량>0)
  const activePods=Object.keys(podAgg).filter(p=>podAgg[p].remain>0).sort((a,b)=>podAgg[b].remain-podAgg[a].remain);
  const activePols=Object.keys(polAgg).filter(p=>polAgg[p].remain>0).sort((a,b)=>polAgg[b].remain-polAgg[a].remain);

  // 매트릭스 계산
  const matrix={};
  activePols.forEach(pol=>{
    matrix[pol]={};
    const pa=polAgg[pol];
    const dray=pa.tentoRatio>0?(avgDray*pa.tentoRatio)/pa.avgRate:0;
    const buyCostPerMT=pa.avgPrice*1000/pa.avgRate;

    activePods.forEach(pod=>{
      const sa2=podAgg[pod];
      // FREIGHT에서 최저 운임 찾기 (POD_ALIAS 적용)
      const freightPod=POD_ALIAS[pod]||pod;
      const carriers=FREIGHT[pol]||{};
      let bestRate=null,bestCarrier='';
      Object.entries(carriers).forEach(([carrier,pods])=>{
        const fr=pods[freightPod];
        if(fr&&fr.rate!==null&&fr.rate>0){
          if(bestRate===null||fr.rate<bestRate){bestRate=fr.rate;bestCarrier=carrier;}
        }
      });

      if(bestRate===null){
        matrix[pol][pod]={margin:null,carrier:'',freight:null,note:'N/A'};
      }else{
        const sellPerMT=sa2.avgPrice;
        const buyPerMT=pa.avgPrice*1000/pa.avgRate;
        const drayPerMT=dray/23;
        const freightPerMT=bestRate/23;
        const margin=sellPerMT-buyPerMT-drayPerMT-freightPerMT;
        matrix[pol][pod]={margin:Math.round(margin*10)/10,carrier:bestCarrier,freight:bestRate,sellPrice:sa2.avgPrice,buyPrice:pa.avgPrice,dray:Math.round(dray*pa.avgRate)};
      }
    });
  });

  return {matrix,activePols,activePods,polAgg,podAgg,avgDray};
}

function renderMatrix(){
  const mxArea=$('mxArea');
  const mxStatus=$('mxStatus');

  if(!Object.keys(FREIGHT).length){
    mxArea.innerHTML='<div style="color:var(--tx3);font-size:11px;padding:8px">Load freight rate Excel to show margin matrix</div>';
    mxStatus.textContent='';
    $('aiPanel').style.display='none';
    return;
  }

  const md=buildMarginData();
  if(!md){mxArea.innerHTML='<div style="color:var(--tx3);font-size:11px;padding:8px">No data for selected item</div>';$('aiPanel').style.display='none';return;}

  const {matrix,activePols,activePods,polAgg,podAgg,avgDray}=md;
  mxStatus.textContent=`($/MT, dray avg ¥${avgDray.toLocaleString()}/本)`;

  // BKG_ROUTE: 선택 Item으로 필터하여 동적 생성
  const BKG_ROUTE={};
  const bkgFiltered=SI==='ALL'?BKG_RAW:BKG_RAW.filter(b=>b.item===SI);
  bkgFiltered.forEach(b=>{
    const key=b.pol+'→'+b.pod;
    if(!BKG_ROUTE[key])BKG_ROUTE[key]={mt:0,carriers:{}};
    BKG_ROUTE[key].mt+=b.mt;
    BKG_ROUTE[key].carriers[b.carrier]=(BKG_ROUTE[key].carriers[b.carrier]||0)+b.mt;
  });
  // 디버그: BKG_ROUTE 키 vs 매트릭스 키 비교
  const routeKeySet=new Set(Object.keys(BKG_ROUTE));
  let mxKeys=[];activePols.forEach(pol=>activePods.forEach(pod=>mxKeys.push(pol+'→'+pod)));
  const matched=mxKeys.filter(k=>routeKeySet.has(k));
  console.log('BKG_ROUTE keys:',Object.keys(BKG_ROUTE).slice(0,10));
  console.log('Matrix keys sample:',mxKeys.slice(0,10));
  console.log('Matched:',matched.length,'/',mxKeys.length);

  // ── 매트릭스 테이블 ──
  let h='<table class="mx"><thead><tr><th class="pol-hd">POL \\ POD<div style="font-size:8px;font-weight:400;color:var(--tx3)">$/MT</div></th>';
  activePods.forEach(pod=>{
    const abbr=POD_ABBR[pod]||pod.substring(0,3);
    const ctry=POD_COUNTRY[abbr]||'';
    const rem=Math.round(podAgg[pod].remain);
    h+=`<th><div>${abbr}</div><div style="font-size:8px;color:var(--tx3)">${ctry}</div><div style="color:var(--dg);font-size:9px">${rem}</div></th>`;
  });
  h+=`<th style="min-width:80px;text-align:left">TOP3</th>`;
  h+='</tr></thead><tbody>';

  activePols.forEach(pol=>{
    const pa=polAgg[pol];
    const rem=Math.round(pa.remain);
    h+=`<tr><td class="pol-td"><div>${pol}</div><div style="font-size:9px;color:var(--ac)">${rem}MT</div><div style="font-size:8px;color:var(--tx3)">¥${pa.avgPrice.toFixed(1)}/kg</div></td>`;

    // 각 POD 셀 + Top3 계산
    const podMargins=[];
    activePods.forEach(pod=>{
      const cell=matrix[pol][pod];
      const bkgKey=pol+'→'+pod;
      const bkg=BKG_ROUTE[bkgKey];

      if(!cell||cell.margin===null){
        let bkgHtml='';
        if(bkg&&bkg.mt>0)bkgHtml=`<div class="mx-bkg">${Math.round(bkg.mt)}MT</div>`;
        h+=`<td><div class="mx-na">-</div>${bkgHtml}</td>`;
      }else{
        const m=cell.margin;
        podMargins.push({pod,m,carrier:cell.carrier,freight:cell.freight,hasBkg:!!(bkg&&bkg.mt>0)});
        const cls=m>5?'mx-plus':m>-5?'mx-mid':'mx-neg';
        let bkgHtml='';
        if(bkg&&bkg.mt>0)bkgHtml=`<div class="mx-bkg">${Math.round(bkg.mt)}MT</div>`;
        h+=`<td><div class="mx-cell ${cls}"><div style="font-weight:700">${m>=0?'+':''}${m.toFixed(1)}</div><div class="mx-carrier">${cShort(cell.carrier)} $${cell.freight}</div>${bkgHtml}</div></td>`;
      }
    });

    // Top3 열
    const top3=podMargins.sort((a,b)=>{
      if(a.hasBkg&&!b.hasBkg)return -1;
      if(!a.hasBkg&&b.hasBkg)return 1;
      return b.m-a.m;
    }).slice(0,3);
    h+=`<td class="mx-rank">`;
    top3.forEach((t,i)=>{
      const abbr=POD_ABBR[t.pod]||t.pod.substring(0,3);
      const cls=i===0?'rk1':i===1?'rk2':'rk3';
      h+=`<div class="${cls}">${i+1}. ${abbr} ${t.m>=0?'+':''}${t.m.toFixed(1)}${t.hasBkg?' ●':''}</div>`;
    });
    h+=`</td></tr>`;
  });

  h+='</tbody></table>';
  mxArea.innerHTML=h;

  // ── LEENAI 推奨配分 패널 ──
  renderAiPanel(md,BKG_ROUTE);
}

function renderAiPanel(md,BKG_ROUTE){
  const {matrix,activePols,activePods,polAgg,podAgg}=md;
  const panel=$('aiPanel');
  const content=$('aiContent');

  // 그리디 배분: 마진 높은 조합부터 할당
  const combos=[];
  activePols.forEach(pol=>{
    activePods.forEach(pod=>{
      const cell=matrix[pol][pod];
      if(!cell||cell.margin===null)return;
      const bkgKey=pol+'→'+pod;
      const hasBkg=BKG_ROUTE[bkgKey]&&BKG_ROUTE[bkgKey].mt>0;
      combos.push({pol,pod,margin:cell.margin,carrier:cell.carrier,freight:cell.freight,hasBkg});
    });
  });

  // 부킹 있는 루트 우선 + 마진 순
  combos.sort((a,b)=>{
    if(a.hasBkg&&!b.hasBkg)return -1;
    if(!a.hasBkg&&b.hasBkg)return 1;
    return b.margin-a.margin;
  });

  const remPol={};activePols.forEach(p=>{const r=Math.max(polAgg[p].remain,0);if(r>20)remPol[p]=r;});
  const remPod={};activePods.forEach(p=>{const r=Math.max(podAgg[p].remain,0);if(r>20)remPod[p]=r;});

  const assignments=[];
  let totalMargin=0,totalMT=0;

  combos.forEach(c=>{
    if(!(remPol[c.pol]>0)||!(remPod[c.pod]>0))return;
    const qty=Math.min(remPol[c.pol],remPod[c.pod]);
    assignments.push({...c,qty:Math.round(qty)});
    remPol[c.pol]-=qty;
    remPod[c.pod]-=qty;
    totalMargin+=c.margin*qty;
    totalMT+=qty;
  });

  if(!assignments.length){panel.style.display='none';return;}
  panel.style.display='block';

  let html='';
  assignments.slice(0,8).forEach(a=>{
    const podAbbr=POD_ABBR[a.pod]||a.pod.substring(0,3);
    const mCls=a.margin>=0?'p':'n';
    html+=`<div class="ai-row"><div class="ai-route"><span>${a.pol}</span> → ${podAbbr} (${cShort(a.carrier)})</div><div>${a.qty}MT</div><div class="ai-margin ${mCls}">${a.margin>=0?'+':''}${a.margin.toFixed(1)}</div></div>`;
  });
  if(assignments.length>8)html+=`<div style="font-size:10px;color:var(--tx3);padding:3px 0">他 ${assignments.length-8}ルート...</div>`;

  html+=`<div class="ai-total"><div>推定合計</div><div>${Math.round(totalMT).toLocaleString()}MT</div><div class="${totalMargin>=0?'pos':'neg'}">$${Math.round(totalMargin).toLocaleString()}/MT計</div></div>`;

  // 根拠
  const bkgRoutes=assignments.filter(a=>a.hasBkg);
  let notes='';
  if(bkgRoutes.length)notes+=`<div>● 既存BKGルート優先 (${bkgRoutes.length}件、混載可能)</div>`;
  notes+='<div>● マージン最大化で全国配分を最適化</div>';
  const negRoutes=assignments.filter(a=>a.margin<0);
  if(negRoutes.length)notes+=`<div style="color:var(--wn)">⚠ マイナスマージン ${negRoutes.length}ルート含む</div>`;
  html+=`<div class="ai-note">${notes}</div>`;

  content.innerHTML=html;
}
function lg(m,t){const e=$('log');e.style.display='block';e.innerHTML+=`<div class="log-${t}">${m}</div>`;e.scrollTop=e.scrollHeight;}
function sa(m,ld){const e=$('aA');if(!m){e.innerHTML='';return;}e.innerHTML=`<div class="al">${ld?'<span class="ld">'+m+'</span>':m}</div>`;}

function updateTs(){
  const now=new Date();
  const ts=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  $('tsSpan').textContent='Updated '+ts;
  $('tsSpan').classList.remove('hid');
}

async function refresh(){
  const btn=$('refBtn');
  btn.disabled=true;btn.textContent='Loading...';
  try{
    IT={};BD=[];SD=[];BK=[];PM={};SM={};PK={};BY={};PD={};DRAY_AVG={};BKG_RAW=[];CARRIERS={};

/* ═══════════════════════════════════════════
   海上運賃 Excel 読み込み
   ═══════════════════════════════════════════ */
let FREIGHT={};
const POD_COLS=['JAKARTA','SURABAYA','LAEMCHABANG','LAT KRABANG','BANGKOK',
  'KWANGYANG','PUSAN','INCHEON','HOCHIMINH','HAIPHONG','CAI MEP','BINH DUONG',
  'DANANG','LEE & MAN','TAIPEI','TAICHUNG','KAOHSIUNG','TAOYUAN','KEELUNG',
  'PENANG','(古着)PORT KLANG','CHITTAGONG','NHAVA SHEVA'];
const POD_SHORT={JAKARTA:'JKT',SURABAYA:'SBY',LAEMCHABANG:'LCB','LAT KRABANG':'LKB',BANGKOK:'BKK',
  KWANGYANG:'KWA',PUSAN:'PUS',INCHEON:'ICN',HOCHIMINH:'SGN',HAIPHONG:'HPH','CAI MEP':'CMT',
  'BINH DUONG':'BDG',DANANG:'DNG','LEE & MAN':'L&M',TAIPEI:'TPE',TAICHUNG:'TXG',
  KAOHSIUNG:'KHH',TAOYUAN:'TYN',KEELUNG:'KEL',PENANG:'PEN','(古着)PORT KLANG':'PKL',
  CHITTAGONG:'CTG','NHAVA SHEVA':'NHV'};
const POL_MAP={'東京':'TOKYO','横浜':'YOKOHAMA','大阪':'OSAKA','神戸':'KOBE','那覇':'NAHA','名古屋':'NAGOYA','博多':'HAKATA','仙台':'SENDAI','新潟':'NIIGATA','金沢':'KANAZAWA','石狩':'ISHIKARI'};

async function loadFreight(){
  try{
    const [fh]=await window.showOpenFilePicker({types:[{description:'Excel',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx','.xlsm']}}]});
    const file=await fh.getFile();
    const buf=await file.arrayBuffer();

    // ── Step 1: JSZip → styles.xml → 赤セル判定 ──
    const zip=await JSZip.loadAsync(buf);
    const stylesXml=await zip.file('xl/styles.xml').async('string');
    const sDom=new DOMParser().parseFromString(stylesXml,'text/xml');

    const redFontIds=new Set();
    sDom.querySelectorAll('fonts>font').forEach((f,idx)=>{
      const color=f.querySelector('color');
      if(!color)return;
      const rgb=color.getAttribute('rgb');
      if(rgb){
        const r2=parseInt(rgb.substring(2,4),16),g2=parseInt(rgb.substring(4,6),16),b2=parseInt(rgb.substring(6,8),16);
        if(r2>180&&g2<80&&b2<80)redFontIds.add(idx);
      }
    });

    const redXfIds=new Set();
    sDom.querySelectorAll('cellXfs>xf').forEach((xf,idx)=>{
      const fontId=parseInt(xf.getAttribute('fontId')||'0');
      if(redFontIds.has(fontId))redXfIds.add(idx);
    });

    const wbXml=await zip.file('xl/workbook.xml').async('string');
    const wbDom=new DOMParser().parseFromString(wbXml,'text/xml');
    const relsXml=await zip.file('xl/_rels/workbook.xml.rels').async('string');
    const relsDom=new DOMParser().parseFromString(relsXml,'text/xml');

    // ── Step 2: SheetJS でシート特定 ──
    const wb=XLSX.read(buf,{type:'array'});
    let targetSheet=null;
    for(const sn of wb.SheetNames){
      if(sn.includes('4月レート')||sn.includes('4月'))targetSheet=sn;
    }
    if(!targetSheet){
      const kuke=wb.SheetNames.filter(s=>s.includes('向け'));
      if(kuke.length)targetSheet=kuke[kuke.length-1];
    }
    if(!targetSheet)targetSheet=wb.SheetNames[wb.SheetNames.length-2]||wb.SheetNames[0];

    // ── Step 3: シートXML → 赤セルSet ──
    const redCells=new Set();
    let sheetRId=null;
    wbDom.querySelectorAll('sheet').forEach(s=>{
      if(s.getAttribute('name')===targetSheet){
        sheetRId=s.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','id')||s.getAttribute('r:id');
      }
    });
    if(sheetRId){
      let sheetTarget=null;
      relsDom.querySelectorAll('Relationship').forEach(r2=>{if(r2.getAttribute('Id')===sheetRId)sheetTarget=r2.getAttribute('Target');});
      if(sheetTarget){
        const sheetPath='xl/'+sheetTarget.replace(/^\//,'');
        const sheetXml=await zip.file(sheetPath).async('string');
        const shDom=new DOMParser().parseFromString(sheetXml,'text/xml');
        shDom.querySelectorAll('row>c').forEach(c=>{
          const s=parseInt(c.getAttribute('s')||'0');
          if(redXfIds.has(s))redCells.add(c.getAttribute('r'));
        });
      }
    }
    lg(`Red detection: ${redFontIds.size} fonts, ${redXfIds.size} styles, ${redCells.size} cells`,'info');

    // ── Step 4: データ読み取り (赤セル除外) ──
    const ws=wb.Sheets[targetSheet];
    function getCell(r,c){return ws[XLSX.utils.encode_cell({r,c})]||null;}

    FREIGHT={};
    let skippedRed=0,activeCount=0;
    const maxRow=(ws['!ref']?XLSX.utils.decode_range(ws['!ref']).e.r:200);
    for(let i=4;i<=maxRow;i++){
      const polCell=getCell(i,0);
      const carrierCell=getCell(i,1);
      if(!polCell||!polCell.v)continue;
      const polJp=String(polCell.v).trim();
      const carrier=String((carrierCell&&carrierCell.v)||'').trim();
      if(!polJp||!carrier)continue;
      const pol=POL_MAP[polJp]||polJp;
      if(!FREIGHT[pol])FREIGHT[pol]={};
      if(!FREIGHT[pol][carrier])FREIGHT[pol][carrier]={};

      for(let c=2;c-2<POD_COLS.length;c++){
        const pod=POD_COLS[c-2];
        const cell=getCell(i,c);
        if(!cell||cell.v===null||cell.v===undefined||cell.v==='')continue;

        const addr=XLSX.utils.encode_cell({r:i,c});
        if(redCells.has(addr)){skippedRed++;continue;}

        const val=cell.v;
        const sv=String(val).trim();
        if(sv==='No offer'||sv==='TBA'||sv==='休'||sv==='不可'||sv.includes('サービス不可')||sv.includes('見積不可')){
          FREIGHT[pol][carrier][pod]={rate:null,note:sv};
        }else{
          const numMatch=String(val).replace(/[＄$]/g,'').match(/^[\d,.]+/);
          if(numMatch){
            const rate=parseFloat(numMatch[0].replace(/,/g,''));
            const note=sv.includes('(')?(sv.match(/\(.+\)/)||[''])[0]:'';
            FREIGHT[pol][carrier][pod]={rate:isNaN(rate)?null:rate,note};
            if(!isNaN(rate))activeCount++;
          }else{
            FREIGHT[pol][carrier][pod]={rate:null,note:sv};
          }
        }
      }
    }

    const polCount=Object.keys(FREIGHT).length;
    $('frLabel').innerHTML=`<span class="freight-badge">${targetSheet}</span> ${polCount} POL, ${activeCount} active (${skippedRed} old skipped)`;
    lg(`Freight: ${polCount} POL, ${activeCount} active, ${skippedRed} red skipped`,'ok');
    render();
  }catch(e){
    if(e.name==='AbortError')return;
    $('frLabel').textContent='Error: '+e.message;
    lg('Freight error: '+e.message,'err');
  }
}
