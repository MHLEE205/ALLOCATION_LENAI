<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEENAI B-01 Allocation v0.4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--sf3:#2a2f46;--bd:#2e3350;--ac:#4f8ef7;--ok:#22c55e;--wn:#f59e0b;--dg:#ef4444;--tx:#e2e8f0;--tx2:#8892a4;--tx3:#4a5568;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;height:46px;}
.logo{font-size:17px;font-weight:800;letter-spacing:1px;}.logo span{color:var(--ac);}
.hd-ver{font-size:11px;color:var(--ac);font-weight:600;}
.hd-user{margin-left:auto;font-size:12px;background:rgba(79,142,247,.15);color:var(--ac);padding:3px 10px;border-radius:12px;display:none;font-family:'Segoe UI',sans-serif;}
.main{max-width:1500px;margin:0 auto;padding:14px 16px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.btn-ac{background:var(--ac);color:#fff;}
.login-card{text-align:center;padding:40px;}
.login-card h2{margin-bottom:8px;font-size:16px;}
.login-card p{color:var(--tx2);margin-bottom:16px;font-size:12px;}
#log{font-size:11px;color:var(--tx2);max-height:150px;overflow-y:auto;padding:8px;background:var(--sf2);border-radius:6px;margin-top:8px;display:none;}
.log-ok{color:var(--ok);}.log-err{color:var(--dg);}.log-info{color:var(--ac);}
.sum-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.sc{background:var(--sf2);border-radius:8px;padding:8px 12px;min-width:90px;text-align:center;}
.sc .lb{font-size:10px;color:var(--tx2);}.sc .vl{font-size:18px;font-weight:700;}
.sc .vl.plus{color:var(--ok);}.sc .vl.minus{color:var(--dg);}
.itabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px;}
.itab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx2);}
.itab:hover{border-color:var(--ac);color:var(--tx);}.itab.on{background:var(--ac);color:#fff;border-color:var(--ac);}
table.dt{width:100%;border-collapse:collapse;font-size:11px;}
table.dt th{background:var(--sf2);color:var(--tx2);font-weight:600;font-size:10px;padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);}
table.dt td{padding:3px 6px;border-bottom:1px solid var(--bd);}
table.dt tr:hover{background:var(--sf2);}
.r{text-align:right;}
.gh{background:var(--sf3);font-weight:700;color:var(--ac);}
.gh2{background:rgba(79,142,247,.08);font-weight:600;color:var(--tx);font-size:11px;}
.pol-row{background:linear-gradient(90deg,var(--ac) 3px,var(--sf3) 3px);font-weight:700;font-size:12px;}
.pol-row td{padding:6px 8px!important;color:var(--tx);}
.pol-row .pol-name{color:var(--ac);font-size:13px;}
.pol-row .pol-num{font-size:13px;}
.neg{color:var(--dg);}.pos{color:var(--ok);}
.sp{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:900px){.sp{grid-template-columns:1fr;}}
.al{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:8px;background:rgba(79,142,247,.1);color:var(--ac);border:1px solid rgba(79,142,247,.3);}
.hid{display:none!important;}
.ld::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spn .6s linear infinite;margin-left:6px;}
@keyframes spn{to{transform:rotate(360deg)}}
.ct{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.btn-ref{background:var(--sf2);color:var(--ac);border:1px solid var(--ac);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-ref:hover{background:var(--ac);color:#fff;}
.btn-ref:disabled{opacity:.4;cursor:not-allowed;}
.ts{font-size:10px;color:var(--tx3);margin-left:6px;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.btn-file{background:var(--sf2);color:var(--wn);border:1px solid var(--wn);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;}
.btn-file:hover{background:var(--wn);color:#000;}
.freight-badge{font-size:10px;background:rgba(245,158,11,.15);color:var(--wn);padding:2px 8px;border-radius:10px;}
</style>
</head>
<body>
<div class="hd">
  <div class="logo"><span>LEENAI</span></div>
  <span style="font-size:13px;font-weight:600">B-01 Allocation</span>
  <div class="hd-ver">v0.4</div>
  <button class="btn-ref hid" id="refBtn" onclick="refresh()">Refresh</button>
  <span class="ts hid" id="tsSpan"></span>
  <div class="hd-user" id="hU"></div>
</div>
<div class="main">
<div class="card login-card" id="lC">
  <h2>COMPASS Dataverse Login</h2>
  <p>Azure AD Authentication - COMPASS Contract Data Direct Access</p>
  <button class="btn btn-ac" onclick="startLogin()">Login</button>
  <div id="log"></div>
</div>
<div id="dA" class="hid">
  <div id="aA"></div>
  <div class="toolbar">
    <button class="btn-file" onclick="loadFreight()">Load Freight Rate (xlsx)</button>
    <span id="frLabel" style="font-size:11px;color:var(--tx2)">Not loaded</span>
  </div>
  <div class="sum-row" id="sR"></div>
  <div class="itabs" id="iT"></div>
  <div class="sp">
    <div class="card">
      <div class="ct">Sales (Sell Balance)</div>
      <div id="sT"></div>
    </div>
    <div class="card">
      <div class="ct">Buy (Purchase Balance)</div>
      <div id="bT"></div>
    </div>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="ct">Data Check</div>
    <div id="dB" style="font-size:11px;color:var(--tx2);max-height:200px;overflow:auto"></div>
  </div>
</div>
</div>
<script>
const CID='f071a165-5e9b-44bf-b6a1-baba654524db',TID='a56988ff-c2b8-4df8-9727-889ad4205198';
const RU='https://mhlee205.github.io/ALLOCATION_LENAI/';
const DV='https://orgde512c6f.crm7.dynamics.com',DA=DV+'/api/data/v9.2';
const SC=DV+'/user_impersonation openid profile';
let AT=null;

function b6(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function sh(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));}
function rn(n=64){const a=new Uint8Array(n);crypto.getRandomValues(a);return b6(a).slice(0,n);}

async function startLogin(){
  lg('Login...','info');
  const v=rn(64),ch=b6(await sh(v)),st=rn(16);
  sessionStorage.setItem('pkce_v',v);sessionStorage.setItem('pkce_s',st);
  location.href=`https://login.microsoftonline.com/${TID}/oauth2/v2.0/authorize?`+new URLSearchParams({client_id:CID,response_type:'code',redirect_uri:RU,scope:SC,state:st,code_challenge:ch,code_challenge_method:'S256',prompt:'select_account'});
}

async function hCb(){
  const p=new URLSearchParams(location.search),code=p.get('code');
  if(!code)return false;
  if(p.get('state')!==sessionStorage.getItem('pkce_s')){alert('State mismatch');return false;}
  lg('Token...','info');
  try{
    const r=await fetch(`https://login.microsoftonline.com/${TID}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:CID,grant_type:'authorization_code',code,redirect_uri:RU,code_verifier:sessionStorage.getItem('pkce_v'),scope:SC})});
    const d=await r.json();if(!d.access_token)throw new Error(d.error_description||'fail');
    AT=d.access_token;history.replaceState({},'',RU);
    sessionStorage.removeItem('pkce_v');sessionStorage.removeItem('pkce_s');
    try{
      const b64=AT.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      const raw=atob(b64);const bytes=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
      const pl=JSON.parse(new TextDecoder().decode(bytes));
      const nm=pl.name||pl.preferred_username||'';
      $('hU').textContent=nm;$('hU').style.display='block';
    }catch(e){}
    lg('Login OK','ok');return true;
  }catch(e){lg(e.message,'err');return false;}
}

async function dg(p){
  const r=await fetch(`${DA}/${p}`,{headers:{'Authorization':'Bearer '+AT,'OData-MaxVersion':'4.0','OData-Version':'4.0','Accept':'application/json','Prefer':'odata.include-annotations="OData.Community.Display.V1.FormattedValue",odata.maxpagesize=5000'}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`${r.status}: ${e?.error?.message||r.statusText}`);}
  return r.json();
}
async function dgA(p){let a=[],u=p;while(u){const d=await dg(u);a=a.concat(d.value||[]);u=d['@odata.nextLink']?d['@odata.nextLink'].replace(DA+'/',''):null;}return a;}

let IT={},BD=[],SD=[],BK=[],PM={},SM={},PK={},BY={},PD={},DRAY_AVG={};

async function load(){
  sa('Data loading...',true);
  try{
    lg('Items...','info');
    (await dgA("cr49f_items?$select=cr49f_itemid,cr49f_item")).forEach(i=>IT[i.cr49f_itemid]=i.cr49f_item);
    lg('Items: '+Object.keys(IT).length,'ok');

    lg('Purchase details...','info');
    BD=await dgA("cr49f_purchase_details?$filter=cr49f_closing eq false&$select=cr49f_purchase_detailid,cr49f_quantity,cr49f_price,cr49f_loading_port,cr49f_incoterms,cr49f_count,_cr49f_item_id_value,_cr49f_purchase_contract_id_value");
    lg('Purchase: '+BD.length,'ok');

    lg('Sales details...','info');
    SD=await dgA("cr49f_sale_details?$filter=cr49f_closing eq false&$select=cr49f_sale_detailid,cr49f_quantity,cr49f_price,cr49f_price_yen,_cr49f_item_id_value,_cr49f_sale_contract_id_value");
    lg('Sales: '+SD.length,'ok');

    lg('Booking details...','info');
    BK=await dgA("cr49f_booking_details?$select=cr49f_net,_cr49f_purchase_contract_detail_id_value,_cr49f_sale_contract_detail_id_value");
    lg('BKG: '+BK.length,'ok');

    lg('Packer...','info');
    const pcG=[...new Set(BD.map(b=>b._cr49f_purchase_contract_id_value).filter(Boolean))];
    (await Promise.all(pcG.map(g=>dg(`cr49f_purchase_contracts(${g})?$select=_cr49f_packer_id_value,cr49f_exchange_rate,cr49f_purchase_contract_no`).catch(()=>null)))).forEach((r,i)=>{if(r)PM[pcG[i]]={pk:r._cr49f_packer_id_value,rt:r.cr49f_exchange_rate,no:r.cr49f_purchase_contract_no};});
    const pkG=[...new Set(Object.values(PM).map(p=>p.pk).filter(Boolean))];
    (await Promise.all(pkG.map(g=>dg(`cr49f_packers(${g})?$select=cr49f_packer`).catch(()=>null)))).forEach((r,i)=>{if(r)PK[pkG[i]]=r.cr49f_packer;});
    lg('Packer: '+Object.keys(PK).length,'ok');

    lg('Buyer/POD...','info');
    const scG=[...new Set(SD.map(s=>s._cr49f_sale_contract_id_value).filter(Boolean))];
    (await Promise.all(scG.map(g=>dg(`cr49f_sale_contracts(${g})?$select=cr49f_sale_contract_no,cr49f_latest_shipment,_cr49f_buyer_id_value,_cr49f_pod1_value`).catch(()=>null)))).forEach((r,i)=>{if(r)SM[scG[i]]={by:r._cr49f_buyer_id_value,pod:r._cr49f_pod1_value,ls:r.cr49f_latest_shipment,no:r.cr49f_sale_contract_no};});
    const byG=[...new Set(Object.values(SM).map(s=>s.by).filter(Boolean))];
    (await Promise.all(byG.map(g=>dg(`cr49f_buyers(${g})?$select=cr49f_buyer,crcf9_country`).catch(()=>null)))).forEach((r,i)=>{if(r)BY[byG[i]]={n:r.cr49f_buyer,c:r.crcf9_country};});
    const pdG=[...new Set(Object.values(SM).map(s=>s.pod).filter(Boolean))];
    (await Promise.all(pdG.map(g=>dg(`cr49f_regions(${g})?$select=cr49f_pod,cr49f_region`).catch(()=>null)))).forEach((r,i)=>{if(r)PD[pdG[i]]={p:r.cr49f_pod,r:r.cr49f_region};});
    lg('Buyer: '+Object.keys(BY).length+', POD: '+Object.keys(PD).length,'ok');

    // ドレー費 (最近2ヶ月 Plant別平均)
    lg('Dray cost (2months avg)...','info');
    const twoMonthsAgo=new Date();twoMonthsAgo.setMonth(twoMonthsAgo.getMonth()-2);
    const dtStr=twoMonthsAgo.toISOString().split('T')[0]+'T00:00:00Z';
    const drayData=await dgA(
      "crcf9_container_informations?$filter=crcf9_work_date ge "+dtStr+
      " and crcf9_dray_cost gt 0"+
      "&$select=crcf9_dray_cost,crcf9_incoterms,_crcf9_parker_plant_id_value"
    );
    const draySum={};
    drayData.forEach(d=>{
      if(d.crcf9_incoterms!=='店頭')return;
      const pl=d._crcf9_parker_plant_id_value;if(!pl)return;
      if(!draySum[pl])draySum[pl]={total:0,cnt:0};
      draySum[pl].total+=d.crcf9_dray_cost;draySum[pl].cnt++;
    });
    Object.entries(draySum).forEach(([k,v])=>{DRAY_AVG[k]=Math.round(v.total/v.cnt);});
    lg('Dray: '+Object.keys(DRAY_AVG).length+' plants, data: '+drayData.length+' records','ok');

    // 割当済 집계
    const aP={},aS={};
    BK.forEach(b=>{const p=b._cr49f_purchase_contract_detail_id_value,s=b._cr49f_sale_contract_detail_id_value,n=b.cr49f_net||0;if(p)aP[p]=(aP[p]||0)+n;if(s)aS[s]=(aS[s]||0)+n;});

    BD.forEach(b=>{
      b._it=IT[b._cr49f_item_id_value]||'?';
      const pc=PM[b._cr49f_purchase_contract_id_value]||{};
      b._pk=PK[pc.pk]||'?';b._rt=pc.rt||155;b._co=pc.no||'';
      b._al=aP[b.cr49f_purchase_detailid]||0;
      b._rm=Math.round(((b.cr49f_quantity||0)-b._al)*100)/100;
      b._pol=b.cr49f_loading_port||'-';
    });
    SD.forEach(s=>{
      s._it=IT[s._cr49f_item_id_value]||'?';
      const sc=SM[s._cr49f_sale_contract_id_value]||{};
      const by=BY[sc.by]||{},pd=PD[sc.pod]||{};
      s._by=by.n||'?';s._ct=by.c||'?';s._pd=pd.p||'?';s._rg=pd.r||'?';
      s._ls=sc.ls;s._co=sc.no||'';
      s._al=aS[s.cr49f_sale_detailid]||0;
      s._rm=Math.round(((s.cr49f_quantity||0)-s._al)*100)/100;
    });

    sa('',false);lg('All data loaded','ok');render();
  }catch(e){sa('Error: '+e.message,false);lg('ERROR: '+e.message,'err');}
}

let SI='ALL';
function render(){
  $('dA').classList.remove('hid');
  const is=new Set();BD.forEach(b=>is.add(b._it));SD.forEach(s=>is.add(s._it));
  const ai=[...is].sort(),sm={};ai.forEach(i=>sm[i]={s:0,b:0});
  BD.forEach(b=>{if(sm[b._it])sm[b._it].b+=b._rm;});
  SD.forEach(s=>{if(sm[s._it])sm[s._it].s+=s._rm;});
  const tS=Object.values(sm).reduce((a,x)=>a+x.s,0),tB=Object.values(sm).reduce((a,x)=>a+x.b,0),df=tB-tS;

  $('sR').innerHTML=`<div class="sc"><div class="lb">Sales Balance(MT)</div><div class="vl">${Math.round(tS).toLocaleString()}</div></div><div class="sc"><div class="lb">Purchase Balance(MT)</div><div class="vl">${Math.round(tB).toLocaleString()}</div></div><div class="sc"><div class="lb">Diff</div><div class="vl ${df>=0?'plus':'minus'}">${df>=0?'+':''}${Math.round(df).toLocaleString()}</div></div><div class="sc"><div class="lb">Dray Plants</div><div class="vl">${Object.keys(DRAY_AVG).length}</div></div>`;

  let th=`<div class="itab ${SI==='ALL'?'on':''}" onclick="sel('ALL')">ALL</div>`;
  ai.sort((a,b)=>(sm[b].s+sm[b].b)-(sm[a].s+sm[a].b)).forEach(i=>{
    const d=Math.round(sm[i].b-sm[i].s);
    th+=`<div class="itab ${SI===i?'on':''}" onclick="sel('${i}')">${i}<span style="color:${d>=0?'var(--ok)':'var(--dg)'};font-size:9px;margin-left:2px">${d>=0?'+':''}${d}</span></div>`;
  });
  $('iT').innerHTML=th;rT();
}

function sel(i){SI=i;render();}

function rT(){
  const bf=SI==='ALL'?BD:BD.filter(b=>b._it===SI);
  const sf=SI==='ALL'?SD:SD.filter(s=>s._it===SI);

  // ── 판매残 (좌측) — POD 1차 그루핑 ──
  let sh='<table class="dt"><thead><tr><th>POD</th><th>Buyer</th><th>Item</th><th>CO.</th><th>Country</th><th class="r">$/MT</th><th class="r">Contract</th><th class="r">Alloc</th><th class="r">Balance</th><th>L.Ship</th></tr></thead><tbody>';
  const byPod={};
  sf.forEach(s=>{const k=s._pd||'?';(byPod[k]=byPod[k]||[]).push(s);});
  // POD를 잔량 큰 순서로
  Object.keys(byPod).sort((a,b)=>{
    const ra=byPod[a].reduce((x,r)=>x+r._rm,0);
    const rb=byPod[b].reduce((x,r)=>x+r._rm,0);
    return rb-ra;
  }).forEach(pod=>{
    const pRows=byPod[pod];
    const pq=pRows.reduce((a,r)=>a+(r.cr49f_quantity||0),0);
    const pa=pRows.reduce((a,r)=>a+r._al,0);
    const pr=pRows.reduce((a,r)=>a+r._rm,0);
    const country=pRows[0]?._rg||'';
    sh+=`<tr class="pol-row"><td class="pol-name">${pod}</td><td></td><td></td><td></td><td style="font-size:10px">${country}</td><td></td><td class="r pol-num">${Math.round(pq)}</td><td class="r pol-num">${Math.round(pa)}</td><td class="r pol-num ${pr<0?'neg':'pos'}">${Math.round(pr)}</td><td></td></tr>`;
    pRows.sort((a,b)=>{
      const la=a._ls?new Date(a._ls):new Date('2099-01-01');
      const lb=b._ls?new Date(b._ls):new Date('2099-01-01');
      return la-lb;
    }).forEach(r=>{
      if(Math.abs(r._rm)<0.5)return;
      const ls=r._ls?new Date(r._ls):null;
      const ug=ls&&(ls-new Date()<14*86400000);
      sh+=`<tr><td></td><td><b>${r._by}</b></td><td style="font-size:10px;color:var(--tx2)">${r._it}</td><td style="font-size:10px;color:var(--tx2)">${r._co}</td><td style="font-size:10px">${r._rg}</td><td class="r">${r.cr49f_price||r.cr49f_price_yen||'-'}</td><td class="r">${Math.round(r.cr49f_quantity||0)}</td><td class="r" style="color:var(--tx2)">${Math.round(r._al)}</td><td class="r ${r._rm<0?'neg':'pos'}"><b>${Math.round(r._rm)}</b></td><td style="font-size:10px;${ug?'color:var(--dg);font-weight:700':''};">${ls?(ls.getMonth()+1)+'/'+ls.getDate():'-'}</td></tr>`;
    });
  });
  sh+='</tbody></table>';
  $('sT').innerHTML=sh;

  // ── 구매残 (우측) — POL 1차 그루핑 ──
  let bh='<table class="dt"><thead><tr><th>POL</th><th>Packer</th><th>Item</th><th>CO.</th><th>Inco</th><th class="r">¥/kg</th><th class="r">Contract</th><th class="r">Alloc</th><th class="r">Balance</th></tr></thead><tbody>';
  const byPol={};
  bf.forEach(b=>{const k=b._pol;(byPol[k]=byPol[k]||[]).push(b);});
  Object.keys(byPol).sort((a,b)=>{
    const ra=byPol[a].reduce((x,r)=>x+r._rm,0);
    const rb=byPol[b].reduce((x,r)=>x+r._rm,0);
    return rb-ra;
  }).forEach(pol=>{
    const pRows=byPol[pol];
    const pq=pRows.reduce((a,r)=>a+(r.cr49f_quantity||0),0);
    const pa=pRows.reduce((a,r)=>a+r._al,0);
    const pr=pRows.reduce((a,r)=>a+r._rm,0);
    bh+=`<tr class="pol-row"><td class="pol-name">${pol}</td><td></td><td></td><td></td><td></td><td></td><td class="r pol-num">${Math.round(pq)}</td><td class="r pol-num">${Math.round(pa)}</td><td class="r pol-num ${pr<0?'neg':'pos'}">${Math.round(pr)}</td></tr>`;
    pRows.sort((a,b)=>b._rm-a._rm).forEach(r=>{
      if(Math.abs(r._rm)<0.5)return;
      bh+=`<tr><td></td><td><b>${r._pk}</b></td><td style="font-size:10px;color:var(--tx2)">${r._it}</td><td style="font-size:10px;color:var(--tx2)">${r._co}</td><td style="font-size:10px">${r.cr49f_incoterms||'-'}</td><td class="r">${r.cr49f_price||'-'}</td><td class="r">${Math.round(r.cr49f_quantity||0)}</td><td class="r" style="color:var(--tx2)">${Math.round(r._al)}</td><td class="r ${r._rm<0?'neg':'pos'}"><b>${Math.round(r._rm)}</b></td></tr>`;
    });
  });
  bh+='</tbody></table>';
  $('bT').innerHTML=bh;

  if(BD.length){
    const drayInfo=Object.entries(DRAY_AVG).slice(0,10).map(([k,v])=>`${k.substring(0,8)}...=¥${v.toLocaleString()}`).join(', ');
    let frInfo='Not loaded';
    if(Object.keys(FREIGHT).length){
      const sample=[];
      Object.entries(FREIGHT).slice(0,3).forEach(([pol,carriers])=>{
        const first=Object.entries(carriers)[0];
        if(first){const rates=Object.entries(first[1]).filter(([,v])=>v.rate).slice(0,3).map(([pod,v])=>`${pod}=$${v.rate}`).join(', ');
          sample.push(`${pol}/${first[0]}: ${rates}`);}
      });
      frInfo=sample.join(' | ');
    }
    $('dB').innerHTML=`<b>Dray avg (top10):</b> ${drayInfo||'No data'}<br><b>Freight sample:</b> ${frInfo}`;
  }
}

function $(id){return document.getElementById(id);}
function lg(m,t){const e=$('log');e.style.display='block';e.innerHTML+=`<div class="log-${t}">${m}</div>`;e.scrollTop=e.scrollHeight;}
function sa(m,ld){const e=$('aA');if(!m){e.innerHTML='';return;}e.innerHTML=`<div class="al">${ld?'<span class="ld">'+m+'</span>':m}</div>`;}

function updateTs(){
  const now=new Date();
  const ts=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  $('tsSpan').textContent='Updated '+ts;
  $('tsSpan').classList.remove('hid');
}

async function refresh(){
  const btn=$('refBtn');
  btn.disabled=true;btn.textContent='Loading...';
  try{
    IT={};BD=[];SD=[];BK=[];PM={};SM={};PK={};BY={};PD={};DRAY_AVG={};
    await load();
    updateTs();
  }catch(e){sa('Refresh error: '+e.message,false);}
  btn.disabled=false;btn.textContent='Refresh';
}

/* ═══════════════════════════════════════════
   海上運賃 Excel 読み込み
   ═══════════════════════════════════════════ */
let FREIGHT={};
const POD_COLS=['JAKARTA','SURABAYA','LAEMCHABANG','LAT KRABANG','BANGKOK',
  'KWANGYANG','PUSAN','INCHEON','HOCHIMINH','HAIPHONG','CAI MEP','BINH DUONG',
  'DANANG','LEE & MAN','TAIPEI','TAICHUNG','KAOHSIUNG','TAOYUAN','KEELUNG',
  'PENANG','(古着)PORT KLANG','CHITTAGONG','NHAVA SHEVA'];
const POD_SHORT={JAKARTA:'JKT',SURABAYA:'SBY',LAEMCHABANG:'LCB','LAT KRABANG':'LKB',BANGKOK:'BKK',
  KWANGYANG:'KWA',PUSAN:'PUS',INCHEON:'ICN',HOCHIMINH:'SGN',HAIPHONG:'HPH','CAI MEP':'CMT',
  'BINH DUONG':'BDG',DANANG:'DNG','LEE & MAN':'L&M',TAIPEI:'TPE',TAICHUNG:'TXG',
  KAOHSIUNG:'KHH',TAOYUAN:'TYN',KEELUNG:'KEL',PENANG:'PEN','(古着)PORT KLANG':'PKL',
  CHITTAGONG:'CTG','NHAVA SHEVA':'NHV'};
const POL_MAP={'東京':'TOKYO','横浜':'YOKOHAMA','大阪':'OSAKA','神戸':'KOBE','那覇':'NAHA','名古屋':'NAGOYA','博多':'HAKATA','仙台':'SENDAI'};

async function loadFreight(){
  try{
    const [fh]=await window.showOpenFilePicker({types:[{description:'Excel',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx','.xlsm']}}]});
    const file=await fh.getFile();
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});

    // 最新月のシートを探す (4月レート or 最後の数字付きシート)
    let targetSheet=null;
    for(const sn of wb.SheetNames){
      if(sn.includes('4月レート')||sn.includes('4月'))targetSheet=sn;
    }
    if(!targetSheet){
      // 最新の「向け」シートを探す
      const kuke=wb.SheetNames.filter(s=>s.includes('向け'));
      if(kuke.length)targetSheet=kuke[kuke.length-1];
    }
    if(!targetSheet)targetSheet=wb.SheetNames[wb.SheetNames.length-2]||wb.SheetNames[0];

    const ws=wb.Sheets[targetSheet];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});

    // Row 3 (idx 2): country headers, Row 4 (idx 3): port headers
    const podRow=data[3]||[];
    // Row 5+ (idx 4+): POL | CARRIER | rates...
    FREIGHT={};
    for(let i=4;i<data.length;i++){
      const row=data[i];if(!row||!row[0])continue;
      const polJp=String(row[0]||'').trim();
      const carrier=String(row[1]||'').trim();
      if(!polJp||!carrier)continue;
      const pol=POL_MAP[polJp]||polJp;
      if(!FREIGHT[pol])FREIGHT[pol]={};
      if(!FREIGHT[pol][carrier])FREIGHT[pol][carrier]={};

      for(let c=2;c<row.length&&c-2<POD_COLS.length;c++){
        const pod=POD_COLS[c-2];
        const val=row[c];
        if(val===null||val===undefined||val==='')continue;
        const sv=String(val).trim();
        if(sv==='No offer'||sv==='TBA'||sv==='休'||sv==='不可'||sv.includes('サービス不可')||sv.includes('見積不可')){
          FREIGHT[pol][carrier][pod]={rate:null,note:sv};
        }else{
          // 숫자 추출 (＄1800(THD EX) 같은 패턴 처리)
          const numMatch=String(val).replace(/[＄$]/g,'').match(/^[\d,.]+/);
          if(numMatch){
            const rate=parseFloat(numMatch[0].replace(/,/g,''));
            const note=sv.includes('(')?(sv.match(/\(.+\)/)||[''])[0]:'';
            FREIGHT[pol][carrier][pod]={rate:isNaN(rate)?null:rate,note};
          }else{
            FREIGHT[pol][carrier][pod]={rate:null,note:sv};
          }
        }
      }
    }

    const polCount=Object.keys(FREIGHT).length;
    let totalRates=0;
    Object.values(FREIGHT).forEach(carriers=>Object.values(carriers).forEach(pods=>totalRates+=Object.keys(pods).length));

    $('frLabel').innerHTML=`<span class="freight-badge">${targetSheet}</span> ${polCount} POL, ${totalRates} rates loaded`;
    lg(`Freight: ${targetSheet} — ${polCount} POL, ${totalRates} rates`,'ok');
    render();
  }catch(e){
    if(e.name==='AbortError')return;
    $('frLabel').textContent='Error: '+e.message;
    lg('Freight error: '+e.message,'err');
  }
}
